version: '3.9'

services:
  backend:
    build: ./backend
    container_name: dca-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      - DEBUG=false
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dca-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
  outputs:
